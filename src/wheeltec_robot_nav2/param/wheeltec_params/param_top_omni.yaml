amcl:
  ros__parameters:
    use_sim_time: False
    # alpha 越大越不信 odom、越依赖激光；Slamware odom 非轮式里程计时建议偏大
    alpha1: 0.6
    alpha2: 0.3
    alpha3: 0.3
    alpha4: 0.5
    alpha5: 0.3
    base_frame_id: "base_link" #机器人底座框架 
    beam_skip_distance: 0.5         #忽略似然场模型中大多数粒子不同意的光束。考虑跳过的最大距离（米）
    beam_skip_error_threshold: 0.9  #由于收敛性不好，未匹配地图后强制进行完全更新的光束百分比
    beam_skip_threshold: 0.3        #需要跳过的光束的百分比。
    do_beamskip: true               # 过道对称环境易误匹配，beamskip 提高鲁棒性
    global_frame_id: "map"          #定位系统发布的坐标框架的名称
    lambda_short: 0.1               #模型 z_short 部分的指数衰减参数
    laser_likelihood_max_dist: 2.0  #在地图上进行障碍物膨胀的最大距离，用于似然场模型
    laser_max_range: 25.0
    laser_min_range: 0.25          # 与 pointcloud_to_laserscan range_min 一致
    laser_model_type: "likelihood_field" #使用哪种模型，
    #beam、likelihood_field 或 unlikely_field_prob。与 unlikely_field 相同，但如果启用，则包含 beamskip 功能
    max_beams: 60                   #更新过滤器时每次扫描要使用多少个均匀分布的光束。
    max_particles: 1200
    min_particles: 250
    odom_frame_id: "odom"
    pf_err: 0.02                    #粒子过滤器群体误差
    pf_z: 0.85                      #粒子过滤器群体密度
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.001
    resample_interval: 2            #重采样之前所需的过滤器更新次数
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    #选项为“nav2_amcl::DifferentialMotionModel”和“nav2_amcl::OmniMotionModel”。

    save_pose_rate: 0.5             #将最后估计的姿势和协方差存储到参数服务器的最大速率（Hz）
    sigma_hit: 0.02                 #模型的 z_hit 部分中使用的高斯模型的标准差
    tf_broadcast: true
    transform_tolerance: 0.5        #发布转换的容差（放宽以容忍TF/时序延迟）
    update_min_a: 0.06              #执行过滤器更新之前需要进行旋转运动。
    update_min_d: 0.025             #执行过滤器更新之前需要进行平移运动
    z_hit: 0.7                      #模型的 z_hit 部分的混合权重，所有使用的 z 权重之和必须为 1。
    z_max: 0.001                    #模型的 z_max 部分的混合权重，所有使用的 z 权重之和必须为 1。
    z_rand: 0.059                   #模型的 z_rand 部分的混合权重，所有使用的 z 权重之和必须为 1。
    z_short: 0.24                   #模型中 z_short 部分的混合权重，所有使用的 z 权重之和必须为 1。
    scan_topic: /scan                #要订阅的激光雷达

    # Initial Pose：在 RViz 用「2D Pose Estimate」设置，勿写死 (0,0) 
    set_initial_pose: True
    initial_pose.x: 0.0
    initial_pose.y: 0.0
    initial_pose.z: 0.0
    initial_pose.yaw: 0.0
    #Amcl参数解释参考：https://docs.nav2.org/configuration/packages/configuring-amcl.html

amcl_map_client:
  ros__parameters:
    use_sim_time: False

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator:
  ros__parameters:
    use_sim_time: False
    transform_tolerance: 0.1 #变换容差
    goal_reached_tol: 0.5 #接受姿势作为目标的容忍度(m)
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10        #BT 执行每次迭代的持续时间（以毫秒为单位
    default_server_timeout: 20  #BT 操作节点等待操作服务器确认时的默认超时值（以毫秒为单位）
    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' are use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    # They can be set here or via a RewrittenYaml remap from a parent launch file to Nav2.
    #plugin_lib_names: #行为树节点共享库列表，Humble后的版本默认包含所有NAV2 BT库，这里可以加入自定义BT节点
    error_code_names:
    - compute_path_error_code 
    - follow_path_error_code

# bt_navigator参数说明：https://docs.nav2.org/configuration/packages/configuring-bt-navigator.html?highlight=bt_navigator

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0           #略降频率，配合速度平滑减轻 cmd_vel 抖动
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.02
    odom_topic: /odom
    failure_tolerance: 0.3 #故障容忍度：被调用的控制器插件可以失败的最大持续时间(S)，设置为0表示禁用
    progress_checker_plugin: "progress_checker" #进度检查器，用于检查机器人进度的进度检查器插件的映射名称
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker" #目标检查器
    controller_plugins: ["FollowPath"]    #控制器插件

    # Progress checker parameters
    progress_checker: #进度检查器
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.04
      movement_time_allowance: 30.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker: #目标检查器
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.4  #xy 目标容差
      yaw_goal_tolerance: 0.4 #yaw目标容差  # 进一步放宽姿态约束：10
    # DWB parameters
    FollowPath:
      # Ranger 为阿克曼底盘，不用 RotationShim（易长期只发角速度）
      plugin: "nav2_mppi_controller::MPPIController"

      time_steps: 28
      # model_dt 须 >= 1/controller_frequency（20Hz→0.05）
      model_dt: 0.05
      batch_size: 300  #减小采样池以降低每周期计算延迟
      vx_std: 0.18
      vy_std: 0.0
      wz_std: 0.18
      vx_max: 0.8
      vx_min: 0.0
      vy_max: 0.0
      wz_max: 0.7
      ax_max: 1.2
      ax_min: 0.0
      ay_max: 0.5
      az_max: 1.5
      iteration_count: 1 #迭代次数
      prune_distance: 4.0
      enforce_path_inversion: false
      transform_tolerance: 0.5 #使用 TF（s）进行数据转换的时间容差（放宽以容忍TF延迟）
      temperature: 0.045
      gamma: 0.06
      motion_model: "DiffDrive"
      visualize: true #是否发布调试轨迹以供可视化。
      TrajectoryVisualizer: #轨迹可视化
        trajectory_step: 5 #轨迹之间的步骤可视化以对候选轨迹池进行下采样
        time_step: 3 #轨迹上点之间的步骤可视化以降低轨迹密度的采样
      AckermannConstraints:
        min_turning_r: 0.02 #最小转弯半径（阿克曼运动模型）
      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PreferForwardCritic", "TwirlingCritic", "VelocityDeadbandCritic"]
      ConstraintCritic: #修复超出设定的动态或运动学约束的轨迹
        enabled: true
        cost_power: 1 
        cost_weight: 4.0  #权重参数
      
      GoalAngleCritic: #仅接近终点时再对齐航向，避免远距离原地掉头
        enabled: true
        cost_power: 1
        cost_weight: 0.8
        threshold_to_consider: 1.0

      GoalCritic: #当距离目标较近时，GoalCritic会激励机器人在空间上向目标导航
        enabled: true
        cost_power: 1
        cost_weight: 30.0 #权重参数
        threshold_to_consider: 3.0  #机器人与目标之间的最小距离（米），超过此距离则要考虑目标距离成本。

      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 3.5
        critical_weight: 22.0
        consider_footprint: true
        collision_cost: 2500.0
        collision_margin_distance: 0.32
        near_goal_distance: 0.5
        cost_scaling_factor: 5.0
        inflation_radius: 0.30

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        threshold_to_consider: 1.5

      TwirlingCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
      # Option to replace Cost and use Obstacles instead

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 1.8
        max_path_occupancy_ratio: 0.28
        trajectory_point_step: 6
        threshold_to_consider: 0.8
        offset_from_furthest: 14
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 28.0
        offset_from_furthest: 8
        threshold_to_consider: 2.5

      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 12.0
        deadband_velocities: [0.0, 0.0, 0.04]
#参数参考：https://docs.nav2.org/configuration/packages/configuring-mppic.html


controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 30.0
      publish_frequency: 20.0
      global_frame: odom
      robot_base_frame: base_link #机器人底座框架
      transform_tolerance: 0.5      # 与 Slamware 低频 odom/map TF 对齐，避免 message_filter 丢帧
      use_sim_time: False  #仿真时间
      rolling_window: true #成本地图是否应随机器人基座框架滚动
      width: 3
      height: 3
      resolution: 0.05     #代价地图1像素的分辨率，以米为单位
      #robot_radius: 0.76   #机器人半径，如果未提供足迹坐标，则使用机器人半径。
      # 矩形足迹（米）；验证：ros2 topic echo /local_costmap/published_footprint --once
      footprint: "[[-0.36, -0.25], [-0.36, 0.25], [0.36, 0.25], [0.36, -0.25]]"
      footprint_padding: 0.03
      plugins: ["voxel_layer","inflation_layer"] #插件包括:{“体素层”，“膨胀层”}
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 8.0
        inflation_radius: 0.30
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"      #体素层插件。
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0                              #体素地图的起始Z坐标
        z_resolution: 0.05                         #体素地图的Z轴分辨率
        z_voxels: 16                               #体素地图的Z轴体素数量
        max_obstacle_height: 2.0                   #可检测障碍物的最大高度（米）
        mark_threshold: 0                          #标记体素的阈值
        observation_sources: scan                  #观测源
        scan:
          topic: /scan
          transform_tolerance: 0.5
          max_obstacle_height: 2.0                  #可检测障碍物的最大高度（米）
          clearing: True                            #是否启用障碍物清除功能
          marking: True                             #是否启用障碍物标记功能
          data_type: "LaserScan"                    #数据类型
          raytrace_max_range: 12.0                  #增大清除范围，快速清除残影
          raytrace_min_range: 0.0                  #控制光线追踪从代价地图中清除障碍物的最大范围 
          obstacle_max_range: 5.5
          obstacle_min_range: 0.0

      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: False
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 1.0            #将成本图发布到话题的频率
      global_frame: map                 #全局框架（与 slam_toolbox / map_server 的 map 一致）
      robot_base_frame: base_link  #机器人底座框架
      transform_tolerance: 0.5
      use_sim_time: False               #仿真时间 
      #robot_radius: 0.76                #机器人半径
      footprint: "[[-0.36, -0.25], [-0.36, 0.25], [0.36, 0.25], [0.36, -0.25]]"
      footprint_padding: 0.03
      resolution: 0.05                  #全局地图1像素的分辨率，以米为单位
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"] #插件包括：{“静态层”，“障碍层”，“膨胀层”}
      obstacle_layer:  #障碍层参数
        plugin: "nav2_costmap_2d::ObstacleLayer" #障碍层插件
        enabled: True
        observation_sources: scan                  #观测源
        scan:
          topic: /scan
          transform_tolerance: 0.5
          max_obstacle_height: 2.0                 #可检测障碍物的最大高度（米）
          clearing: True                           #是否启用障碍物清除功能
          marking: True                            #是否启用障碍物标记功能
          data_type: "LaserScan"                   #数据类型
          raytrace_max_range: 10.0                 #控制光线追踪从代价地图中清除障碍物的最大范围 
          raytrace_min_range: 0.0                  #控制光线追踪从代价地图中清除障碍物的最大范围 
          obstacle_max_range: 5.0
          obstacle_min_range: 0.0
      static_layer: #静态层参数
        plugin: "nav2_costmap_2d::StaticLayer"     #静态层插件
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 8.0
        inflation_radius: 0.34
      always_send_full_costmap: True
  global_costmap_client:
    ros__parameters:
      use_sim_time: False
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "WHEELTEC.yaml"
    # 与 global_costmap / AMCL 的 map 一致（slam_toolbox 建图 frame）
    frame_id: "map"

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0                #尝试保存地图的超时时间（秒）
    free_thresh_default: 0.25            #占用网格的自由空间最大概率阈值
    occupied_thresh_default: 0.65        #占用网格的占用空间最小概率阈值
    map_subscribe_transient_local: True  #地图话题的 QoS 设置


planner_server: #规划器服务器参数
  ros__parameters:
    expected_planner_frequency: 5.0     #预期的规划器频率（降低期望刷新频率以减少不必要的全局重规划）
    use_sim_time: False
    planner_plugins: ["GridBased"] #规划器插件类型，需要与BT Tree文件匹配
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.25                     # tolerance for planning if unable to reach exact pose, in meters, for 2D node
      downsample_costmap: false           # whether or not to downsample the map
      downsampling_factor: 1              # multiplier for the resolution of the costmap layer (e.g. 2 on a 5cm costmap would be 10cm)
      allow_unknown: true                # allow traveling in unknown space
      max_iterations: 1000000             # maximum total iterations to search for before failing (in case unreachable), set to -1 to disable
      max_on_approach_iterations: 1000    # maximum number of iterations to attempt to reach goal once in tolerance, 2D only
      max_planning_time: 5.0              # max time in s for planner to plan, smooth, and upsample. Will scale maximum smoothing and upsampling times based on remaining time after planning.
      motion_model_for_search: "DUBIN"   # 2D Moore, Von Neumann; Hybrid Dubin, Redds-Shepp; State Lattice set internally
      cost_travel_multiplier: 2.8
      angle_quantization_bins: 72         # For Hybrid/Lattice nodes: Number of angle bins for search, must be 1 for 2D node (no angle search)
      analytic_expansion_ratio: 4.0       # For Hybrid/Lattice nodes: The ratio to attempt analytic expansions during search for final approach.
      analytic_expansion_max_cost: 200.0
      minimum_turning_radius: 0.1         # For Hybrid/Lattice nodes: minimum turning radius in m of path / vehicle
      reverse_penalty: 1.2                # For Reeds-Shepp model: penalty to apply if motion is reversing, must be => 1
      change_penalty: 0.2                 # For Hybrid nodes: penalty to apply if motion is changing directions, must be >= 0
      non_straight_penalty: 2.3          # 提高非直线代价，全局路径更贴直线段
      cost_penalty: 4.8
      lookup_table_size: 20.0             # For Hybrid nodes: Size of the dubin/reeds-sheep distance window to cache, in meters.
      cache_obstacle_heuristic: True      # For Hybrid nodes: Cache the obstacle map dynamic programming distance expansion heuristic between subsiquent replannings of the same goal location. Dramatically speeds up replanning performance (40x) if costmap is largely static.     
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.9
        w_data: 0.05
        tolerance: 1.0e-10

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 0.1  #TF transform tolerance.
      max_its: 2000
      do_refinement: True
      w_smooth: 0.9         # 更强的平滑权重（在 smoother 的配置里）
      w_data: 0.05          # 更低的数据保持权重（让平滑更生效）

# 底盘速度平滑：减轻 MPPI 输出抖动；odom 由 bringup remap 到 /slamware_ros_sdk_server_node/odom
velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 50.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.8, 0.0, 0.7]
    min_velocity: [0.0, 0.0, -0.7]
    max_accel: [0.8, 0.0, 1.0]
    max_decel: [-0.8, 0.0, -1.0]
    odom_topic: "/odom"
    odom_duration: 0.2
    deadband_velocity: [0.02, 0.0, 0.05]
    velocity_timeout: 0.6

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
      minimum_speed: 0.0
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.35
    min_rotational_vel: 0.08
    rotational_acc_lim: 0.4

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    loop_rate: 20 #循环速率
    stop_on_failure: false #如果单个航点失败，是否使操作任务失败。如果为 false，将继续到下一个航点。
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 1200 #机器人到达每个航点后休眠/等待的时间（以毫秒为单位）
#waypoint_follower 参数参考
#https://docs.nav2.org/configuration/packages/configuring-waypoint-follower.html?highlight=stop_on_failure
