slam_toolbox:
  ros__parameters:

    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    odom_frame: odom
    # 与 online_async_launch 中 slamware_map->laser_map 静态 TF 一致
    map_frame: laser_map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    map_start_pose: [0.0, 0.0, 0.0]

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 0.75
    resolution: 0.05
    max_laser_range: 30.0
    minimum_time_interval: 0.25
    transform_timeout: 0.2
    tf_buffer_duration: 30.
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    use_scan_matching: true
    use_scan_barycenter: true
    # 原 0.3 转弯插点少，直角被里程计“抹圆”；略收紧以兼顾回环
    minimum_travel_distance: 0.25
    minimum_travel_heading: 0.24
    scan_buffer_size: 16
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.22
    link_scan_maximum_distance: 1.35

    loop_search_maximum_distance: 6.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.38
    loop_match_minimum_response_fine: 0.42

    # 直角 scan 匹配（与 corridor 同思路，分辨率略粗以减轻算力）
    correlation_search_space_dimension: 0.40
    correlation_search_space_resolution: 0.009
    correlation_search_space_smear_deviation: 0.07

    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.045
    loop_search_space_smear_deviation: 0.035

    # 原 angle_variance_penalty=1.2 过信里程计，平行边会夹角
    distance_variance_penalty: 0.55
    angle_variance_penalty: 0.90

    fine_search_angle_offset: 0.002618
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0174533
    minimum_angle_penalty: 0.88
    minimum_distance_penalty: 0.52
    use_response_expansion: true
